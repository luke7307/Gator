<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; font-family: monospace; }
  iframe { border: none; display: block; }
  #diag { 
    position: fixed; 
    top: 0; left: 0; right: 0;
    background: yellow; 
    color: black; 
    padding: 10px; 
    z-index: 99999;
    font-size: 11px;
    line-height: 1.4;
    max-height: 300px;
    overflow: auto;
  }
</style>
</head>
<body>
<div id="diag">⏳ 正在诊断...</div>
<iframe id="app" src="http://localhost:8766/index.html" style="width:100%;height:900px;"></iframe>
<script>
const iframe = document.getElementById('app');
const diag = document.getElementById('diag');
const log = (msg) => { diag.innerHTML += '<br>' + msg; };

iframe.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const w = iframe.contentWindow;
      const d = iframe.contentDocument;
      
      // 切到 masonry
      w.currentLayout = 'masonry';
      
      // 添加示例
      if (w.addDemoData) w.addDemoData();
      
      setTimeout(() => {
        const wraps = d.querySelectorAll('.card-image-wrap');
        log('✓ Card image wraps: ' + wraps.length);
        
        wraps.forEach((wrap, i) => {
          if (i < 3) {
            const rect = wrap.getBoundingClientRect();
            const slider = wrap.querySelector('.card-img-slider');
            const img = wrap.querySelector('.card-img-slider img');
            const cs = img ? getComputedStyle(img) : null;
            log('Wrap ' + i + ': ' + Math.round(rect.width) + 'x' + Math.round(rect.height) + 'px, slider: ' + (slider ? Math.round(slider.offsetWidth) : '?') + 'px, img: ' + (img ? Math.round(img.offsetWidth) : '?') + 'px (computed: ' + (cs ? cs.width : '?') + ')');
          }
        });
        
        // 检查 computed style
        const styles = d.querySelectorAll('style');
        log('Total <style> tags: ' + styles.length);
        for (let i = 0; i < styles.length; i++) {
          if (styles[i].textContent.includes('100cqi') || styles[i].textContent.includes('flex: 0 0 100%')) {
            log('Style ' + i + ' has card img rules');
          }
        }
      }, 3000);
    } catch(e) { log('Error: ' + e.message); }
  }, 2000);
});
</script>
</body>
</html>
