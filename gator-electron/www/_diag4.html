<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding-top: 300px; background: #f0f0f0; }
  #diag { 
    position: fixed; 
    top: 0; left: 0; right: 0;
    background: #ffeb3b; 
    color: black; 
    padding: 12px;
    z-index: 99999;
    font-size: 13px;
    line-height: 1.4;
    font-family: monospace;
    border: 2px solid red;
  }
  iframe { border: none; display: block; background: white; }
</style>
</head>
<body>
<div id="diag">⏳ 启动诊断...</div>
<iframe id="app" src="http://localhost:8766/index.html" style="width:100%;height:2000px;"></iframe>
<script>
const iframe = document.getElementById('app');
const diag = document.getElementById('diag');
let log = '';
const w = (m) => { log += '<br>› ' + m; diag.innerHTML = log; };

iframe.addEventListener('load', () => {
  w('iframe loaded, 等待 app.js 初始化...');
  // 等待更长时间让 DOMContentLoaded 触发
  setTimeout(() => {
    try {
      const win = iframe.contentWindow;
      const doc = iframe.contentDocument;
      
      // 检查全局变量是否存在
      w('检查全局变量:');
      w('typeof win.currentLayout = ' + typeof win.currentLayout);
      w('typeof win.items = ' + typeof win.items);
      w('typeof win.imagePreviewMode = ' + typeof win.imagePreviewMode);
      w('typeof win.addDemoData = ' + typeof win.addDemoData);
      w('typeof win.renderFeed = ' + typeof win.renderFeed);
      
      // 不依赖 items.length
      w('---');
      w('强制切到 masonry 并添加示例...');
      try {
        if (typeof win.addDemoData === 'function') {
          win.addDemoData();
          w('addDemoData 已调用');
        }
        if (typeof win.currentLayout !== 'undefined') {
          win.currentLayout = 'masonry';
          w('currentLayout = masonry');
        }
        if (typeof win.imagePreviewMode !== 'undefined') {
          win.imagePreviewMode = true;
          w('imagePreviewMode = true');
        }
        if (typeof win.renderFeed === 'function') {
          win.renderFeed(false, true);
          w('renderFeed 已调用');
        }
      } catch(e) { w('设置错误: ' + e.message); }
      
      setTimeout(() => {
        const wraps = doc.querySelectorAll('.card-image-wrap');
        w('---');
        w('结果: .card-image-wrap 数量 = ' + wraps.length);
        
        if (wraps.length > 0) {
          const wrap = wraps[0];
          const slider = wrap.querySelector('.card-img-slider');
          const img = wrap.querySelector('.card-img-slider img');
          const wrapRect = wrap.getBoundingClientRect();
          w('wrap size: ' + Math.round(wrapRect.width) + 'x' + Math.round(wrapRect.height) + 'px');
          w('wrap padding-bottom: ' + getComputedStyle(wrap).paddingBottom);
          w('slider: ' + slider.offsetWidth + 'x' + slider.offsetHeight);
          w('img: ' + img.offsetWidth + 'x' + img.offsetHeight);
          w('img computed width: ' + getComputedStyle(img).width);
          w('img computed flex: ' + getComputedStyle(img).flex);
          w('img inline style: "' + img.getAttribute('style') + '"');
        }
      }, 1500);
    } catch(e) { w('ERROR: ' + e.message); }
  }, 4000);
});
</script>
</body>
</html>
