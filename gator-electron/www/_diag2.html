<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; }
  #diag { 
    position: fixed; 
    top: 0; left: 0; right: 0;
    background: yellow; 
    color: black; 
    padding: 8px;
    z-index: 99999;
    font-size: 11px;
    line-height: 1.3;
  }
  iframe { border: none; display: block; margin-top: 200px; }
</style>
</head>
<body>
<div id="diag">⏳ 诊断中...</div>
<iframe id="app" src="http://localhost:8766/index.html" style="width:100%;height:1200px;"></iframe>
<script>
const iframe = document.getElementById('app');
const diag = document.getElementById('diag');
let log = '';
const w = (m) => { log += '<br>' + m; diag.innerHTML = log; };

iframe.addEventListener('load', () => {
  setTimeout(() => {
    try {
      const win = iframe.contentWindow;
      const doc = iframe.contentDocument;
      
      w('1. 强制添加示例数据...');
      win.addDemoData();
      
      setTimeout(() => {
        w('2. 切换 masonry 模式...');
        win.currentLayout = 'masonry';
        win.imagePreviewMode = true;
        win.renderFeed(false, true);
        
        setTimeout(() => {
          w('3. 检查 DOM 结构:');
          const wraps = doc.querySelectorAll('.card-image-wrap');
          w('  .card-image-wrap 数量: ' + wraps.length);
          
          if (wraps.length > 0) {
            const wrap = wraps[0];
            const slider = wrap.querySelector('.card-img-slider');
            const img = wrap.querySelector('.card-img-slider img');
            w('  wrap: ' + wrap.offsetWidth + 'x' + wrap.offsetHeight);
            w('  slider: ' + slider.offsetWidth + 'x' + slider.offsetHeight);
            w('  img: ' + img.offsetWidth + 'x' + img.offsetHeight);
            w('  img computed width: ' + getComputedStyle(img).width);
            w('  wrap computed padding-bottom: ' + getComputedStyle(wrap).paddingBottom);
            w('  wrap inline style: ' + wrap.getAttribute('style'));
          } else {
            w('  ❌ 没有任何 .card-image-wrap');
            w('  当前 layout: ' + win.currentLayout);
            w('  imagePreviewMode: ' + win.imagePreviewMode);
            w('  items count: ' + win.items.length);
            w('  第一个 item type: ' + (win.items[0] ? win.items[0].type : 'none'));
            w('  第一个 item 是否有图: ' + (win.items[0] ? /\!\[[^\]]*\]\([^)]+\)/.test(win.items[0].content) : 'n/a'));
          }
        }, 1000);
      }, 500);
    } catch(e) { w('ERROR: ' + e.message); }
  }, 2000);
});
</script>
</body>
</html>
