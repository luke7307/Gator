<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>
<body style="margin:0;">
<iframe id="app" src="http://localhost:8766/index.html" style="width:430px;height:900px;border:none;display:block;"></iframe>
<script>
  const iframe = document.getElementById('app');
  iframe.addEventListener('load', () => {
    setTimeout(() => {
      try {
        const w = iframe.contentWindow;
        // 切到 masonry 模式
        w.currentLayout = 'masonry';
        if (w.renderFeed) w.renderFeed(false, true);
      } catch(e) { console.error(e); }
    }, 1500);
  });
</script>
</body>
</html>
