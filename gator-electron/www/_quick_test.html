<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>body{margin:0}iframe{border:none;display:block;width:100%;height:100vh}</style>
</head>
<body>
<iframe id="app" src="http://localhost:8766/index.html"></iframe>
<script>
const iframe = document.getElementById('app');
iframe.addEventListener('load', () => {
  setTimeout(() => {
    const win = iframe.contentWindow;
    const doc = iframe.contentDocument;
    // 直接检查 module-level 变量
    // 因为 let 不会暴露到 window，我们换种方法
    // 触发一次 toggleImagePreviewMode 然后看效果
    const toggleBtn = doc.querySelector('[onclick*="toggleImagePreviewMode"]');
    if (toggleBtn) {
      // 强制触发一次
      console.log('找到 toggleImagePreviewMode 按钮');
    }
    
    // 找顶部带图预览开关按钮
    const allBtns = doc.querySelectorAll('button');
    let found = null;
    allBtns.forEach(b => {
      if (b.onclick && b.onclick.toString().includes('toggleImagePreviewMode')) {
        found = b;
      }
    });
    if (found) {
      found.click();
      console.log('已点击带图预览开关');
      // 等1秒后再次点击（因为是 toggle，需要偶数次）
      setTimeout(() => {
        found.click();
        console.log('已再次点击（确保是开启状态）');
      }, 1000);
    } else {
      console.log('未找到带图预览开关按钮');
      // 列出所有 onclick 看看
      allBtns.forEach((b, i) => {
        if (b.onclick) {
          const code = b.onclick.toString().substring(0, 50);
          if (i < 20) console.log('btn ' + i + ': ' + code);
        }
      });
    }
  }, 4000);
});
</script>
</body>
</html>
