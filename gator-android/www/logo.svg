<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="30%" cy="30%" r="70%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="32" stdDeviation="40" flood-color="#1E1B4B" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.15" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bgGradient)" filter="url(#softShadow)"/>
  
  <rect x="80" y="80" width="864" height="864" rx="184" ry="184" fill="url(#innerGlow)"/>
  
  <rect x="120" y="120" width="784" height="784" rx="160" ry="160" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.08"/>
  
  <g transform="translate(512, 512)">
    <path d="M-180, -180 C-180, -80 -80, 0 0, 0 C-120, 0 -180, -60 -180, -180 Z" fill="none" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" filter="url(#innerShadow)"/>
    <path d="M0, 0 C80, 0 180, 80 180, 180 C180, 280 80, 360 0, 360" fill="none" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" filter="url(#innerShadow)"/>
    <path d="M0, 360 C-80, 360 -180, 280 -180, 180" fill="none" stroke="#FFFFFF" stroke-width="52" stroke-linecap="round" filter="url(#innerShadow)"/>
    
    <circle cx="120" cy="-60" r="36" fill="#FB923C"/>
    <circle cx="-40" cy="-80" r="16" fill="#60A5FA"/>
    <circle cx="-20" cy="60" r="18" fill="#F472B6"/>
    <circle cx="80" cy="100" r="14" fill="#34D399"/>
    
    <polygon points="40,-40 60,-80 80,-40" fill="#FB7185"/>
    <polygon points="-60,20 -80,60 -40,60" fill="#22D3EE"/>
    <polygon points="60,140 80,180 40,180" fill="#818CF8"/>
    <polygon points="-80,-20 -100,20 -60,20" fill="#4ADE80"/>
  </g>
</svg>